<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>MakeIt</h1>

    <section id="formulario">
        <h2>Nova tarefa</h2>
        <input type="text" id="titulo" placeholder="Título da tarefa">
        <textarea id="descricao" placeholder="Descrição (opcional)"></textarea>
        <button id="btn-adicionar">Adicionar</button>
    </section>

    <section id="lista-tarefas">
        <h2>Minhas tarefas</h2>
        <ul id="lista">
            <li>Tarefa exemplo 1</li>
            <li>Tarefa exemplo 2</li>
        </ul>
    </section>

    <section id="detalhes">
        <h2>Detalhes da Tarefa</h2>
        <p><strong>Título:</strong> <span id="detalhe-titulo"></span></p>
        <p><strong>Descrição:</strong> <span id="detalhe-descricao"></span></p>
        <p><strong>Título:</strong> <span id="detalhe-status"></span></p>
    </section>

</body>
</html>
